# This workflow will build a Java project with Gradle
# For more information see: https://help.github.com/actions/language-and-framework-guides/building-and-testing-java-with-gradle

name: Java CI with Gradle

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:
    inputs:
      plugin-version:
        description: 'New plugin version (e.g. 2.0.0)'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Compile with min JOSM version
      run: ./gradlew compileJava_minJosm

    - name: Run code style checks
      run: ./gradlew checkstyleMain

    - name: Execute Gradle build (including tests)
      run: |
        VERSION_ARG=""
        if [ -n "${{ github.event.inputs.plugin-version }}" ]; then
          VERSION_ARG="-Pplugin.version=${{ github.event.inputs.plugin-version }}"
        fi
        ./gradlew build $VERSION_ARG
